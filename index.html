*{box-sizing:border-box;margin:0;padding:0}

.container{max-width:780px;margin:0 auto;padding:40px 20px;position:relative;z-index:1}
.header{text-align:center;padding:40px 0 30px;position:relative}
.header:before,.header:after{content:"";display:block;width:60px;height:2px;background:linear-gradient(90deg,transparent,#8b4513,transparent);margin:0 auto 12px}
.header:after{margin:12px auto 0}
.header h1{font-family:"Noto Serif SC","SimSun",serif;font-size:36px;color:#5c2d0a;letter-spacing:8px;font-weight:400;margin-bottom:8px}
.header .subtitle{font-size:13px;color:#a0896e;letter-spacing:4px}
.input-card{background:linear-gradient(135deg,#fffbf5 0%,#fff8ee 100%);border-radius:12px;padding:32px 28px;box-shadow:0 4px 24px rgba(139,69,19,0.08),0 1px 3px rgba(0,0,0,0.04);border:1px solid rgba(184,134,11,0.15);margin-bottom:24px;position:relative;overflow:hidden}
.input-card:before{content:"";position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#8b4513,#b8860b,#8b4513)}
.input-card h3{font-family:"Noto Serif SC","SimSun",serif;font-size:18px;color:#5c2d0a;margin-bottom:20px;letter-spacing:2px}
.form-row{display:flex;gap:12px;flex-wrap:wrap;align-items:end}
.form-group{flex:1;min-width:120px}
.form-group label{display:block;font-size:12px;color:#8b7355;margin-bottom:6px;letter-spacing:1px;text-transform:uppercase}
.form-group select,.form-group input{width:100%;padding:12px 14px;border:1px solid #d4c5a9;border-radius:8px;font-size:15px;background:#fffdf8;color:#3d3226;font-family:inherit;transition:all 0.2s;appearance:none;-webkit-appearance:none;cursor:pointer}

.form-group select:hover,.form-group input:hover{border-color:#b8860b}
.form-group select:focus,.form-group input:focus{outline:none;border-color:#8b4513;box-shadow:0 0 0 3px rgba(139,69,19,0.08)}
.btn-primary{width:100%;padding:14px;background:linear-gradient(135deg,#8b4513 0%,#6b3410 100%);color:#fff;border:none;border-radius:8px;font-size:17px;cursor:pointer;letter-spacing:4px;margin-top:16px;font-family:"Noto Serif SC","SimSun",serif;transition:all 0.3s;box-shadow:0 4px 12px rgba(139,69,19,0.2)}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(139,69,19,0.3)}
.btn-sm{display:inline-block;padding:6px 14px;font-size:11px;margin:3px;background:transparent;border:1px solid #d4c5a9;border-radius:6px;cursor:pointer;color:#8b7355;letter-spacing:1px;transition:all 0.2s}
.btn-sm:hover{border-color:#8b4513;color:#8b4513;background:#fffdf8}
.result-section{display:none;animation:fadeIn 0.6s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

.card-title .icon{width:24px;height:24px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}

.bazi-pillar{background:linear-gradient(180deg,#fffdf8 0%,#fdfaf2 100%);border:1px solid #e8dcc8;border-radius:8px;padding:12px 6px;transition:transform 0.2s}
.bazi-pillar:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(139,69,19,0.1)}
.bazi-pillar .pillar-name{font-size:10px;color:#a0896e;margin-bottom:4px;letter-spacing:1px}
.bazi-pillar .gan{font-size:26px;font-weight:700;color:#3d3226;line-height:1.2}
.bazi-pillar .zhi{font-size:17px;color:#8b7355}
.bazi-pillar .tag-row{font-size:10px;color:#a0896e;margin-top:2px}
.fortune-table{width:100%;border-collapse:collapse;font-size:13px}
.fortune-table th{background:#f5f0e8;color:#8b4513;padding:8px 6px;font-weight:400;font-size:11px;letter-spacing:1px;text-align:center}
.fortune-table td{padding:8px 6px;border-bottom:1px solid #e8dcc8;text-align:center}
.fortune-table tr.current{background:#fff8e1;font-weight:700}
.interpret-text p{margin-bottom:8px;font-size:14px;text-indent:2em;line-height:1.9}
.interpret-text .em{color:#8b4513;font-weight:700}
.interpret-text .warn{color:#c0392b}
.interpret-text .good{color:#2e8b57}
.tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;margin:2px;letter-spacing:1px}
.tag-gold{background:#fdf5e6;color:#b8860b;border:1px solid #daa520}
.tag-red{background:#fff0f0;color:#8b0000;border:1px solid #dc143c}
.tag-green{background:#f0fff0;color:#2e8b57;border:1px solid #3cb371}
.solar-info{text-align:center;font-size:12px;color:#a0896e;margin-top:8px}
.disclaimer{background:linear-gradient(135deg,#fffdf5 0%,#fff8ee 100%);border:1px solid #e8dcc8;border-radius:8px;padding:16px 20px;margin-top:24px;text-align:center}
